name: Fix Long Paths on Checkout

on:
  workflow_dispatch:

jobs:
  fix-checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git for long paths
        run: |
          cd /var/www/nrchd.kz
          git config core.longpaths true
          git sparse-checkout init --cone
          git sparse-checkout set '/*' '!public/storage'

